{% extends "base.html" %}
{% block title %}Create account{% endblock %}
{% block content %}
<div style="max-width:380px;margin:8vh auto;">
  <div class="card">
    <h1 class="mb-8">Create your {{ HELM_PRODUCT }} org</h1>
    <form method="post" action="{% url 'accounts:signup' %}">{% csrf_token %}
      <div class="field"><label>Organization name</label><input type="text" name="org_name" placeholder="Acme Inc"></div>
      <div class="field"><label>Username</label><input type="text" name="username"></div>
      <div class="field"><label>Email</label><input type="text" name="email"></div>
      <div class="field"><label>Password</label><input type="password" name="password"></div>
      <button class="btn btn-primary" style="width:100%">Create org &amp; sign in</button>
    </form>
    <div class="muted small mt-16">Have an account? <a class="link" href="{% url 'accounts:login' %}">Sign in</a></div>
  </div>
</div>
{% endblock %}
